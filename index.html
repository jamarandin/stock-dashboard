<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Defense & AI Portfolio Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background:#020617;
  color:white;
}

.wrap {
  max-width:1200px;
  margin:auto;
  padding:30px;
}

h1 {
  font-size:38px;
  margin-bottom:10px;
}

.subtitle {
  color:#94a3b8;
  margin-bottom:20px;
}

.card {
  background:#0f172a;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
}

.metric {
  font-size:24px;
  font-weight:bold;
}

.positive { color:#34d399; }
.negative { color:#f87171; }

table {
  width:100%;
  border-collapse:collapse;
}

td, th {
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

canvas {
  margin-top:20px;
}
</style>
</head>

<body>
<div class="wrap">

<h1>Defense & AI Portfolio Tracker</h1>
<div class="subtitle">
Live tracking of defense, AI, and geopolitical momentum positions.
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="grid">
<div class="card">
<div>Portfolio Value</div>
<div class="metric" id="value">$0</div>
</div>

<div class="card">
<div>Unrealized P/L</div>
<div class="metric" id="pnl">$0</div>
</div>

<div class="card">
<div>Best Position</div>
<div class="metric" id="best">--</div>
</div>

<div class="card">
<div>Largest Allocation</div>
<div class="metric" id="largest">--</div>
</div>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Ticker</th>
<th>Shares</th>
<th>Avg Cost</th>
<th>Price</th>
<th>Value</th>
<th>P/L</th>
<th>%</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>

const API_KEY = "d73dm2hr01qjjol2lqq0d73dm2hr01qjjol2lqqg"; // ← replace later

const positions = [
{ticker:"DRS", shares:5.400676, avg:46.29},
{ticker:"RTX", shares:3.634664, avg:192.59},
{ticker:"MRCY", shares:3.292506, avg:75.93},
{ticker:"LDOS", shares:3.168075, avg:157.82},
{ticker:"PLTR", shares:5.392289, avg:148.36},
{ticker:"AGH", shares:62.131868, avg:4.02},
{ticker:"UMAC", shares:15.757957, avg:15.87}
];

function money(n){ return "$"+n.toFixed(2); }

async function getPrice(t){
  const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${t}&token=${API_KEY}`);
  const d = await r.json();
  return d.c;
}

async function getHistory(t){
  const from = Math.floor(new Date(new Date().getFullYear(),0,1)/1000);
  const to = Math.floor(Date.now()/1000);

  const r = await fetch(`https://finnhub.io/api/v1/stock/candle?symbol=${t}&resolution=D&from=${from}&to=${to}&token=${API_KEY}`);
  const d = await r.json();
  return d.c;
}

function normalize(arr){
  let base = arr[0];
  return arr.map(v => (v/base)*100);
}

async function buildChart(){
  const ctx = document.getElementById("chart");

  let datasets = [];
  let labels = [];

  for (let p of positions){
    try{
      let data = await getHistory(p.ticker);
      let norm = normalize(data);

      labels = data.map((_,i)=>i);

      datasets.push({
        label:p.ticker,
        data:norm,
        borderWidth:2,
        tension:.4,
        pointRadius:0
      });
    }catch{}
  }

  new Chart(ctx,{
    type:"line",
    data:{labels,datasets},
    options:{
      plugins:{legend:{labels:{color:"#94a3b8"}}},
      scales:{
        x:{ticks:{color:"#64748b"}},
        y:{ticks:{color:"#64748b"}}
      }
    }
  });
}

async function load(){
  let total=0, cost=0;
  let best=null, largest=null;

  let table="";

  for (let p of positions){
    let price = await getPrice(p.ticker);

    let value = price*p.shares;
    let basis = p.avg*p.shares;
    let pnl = value-basis;
    let pct = pnl/basis*100;

    total+=value;
    cost+=basis;

    if(!best || pct>best.pct) best={ticker:p.ticker,pct};
    if(!largest || value>largest.value) largest={ticker:p.ticker,value};

    table+=`
    <tr>
    <td>${p.ticker}</td>
    <td>${p.shares.toFixed(2)}</td>
    <td>${money(p.avg)}</td>
    <td>${money(price)}</td>
    <td>${money(value)}</td>
    <td class="${pnl>=0?"positive":"negative"}">${money(pnl)}</td>
    <td class="${pct>=0?"positive":"negative"}">${pct.toFixed(2)}%</td>
    </tr>`;
  }

  document.getElementById("table").innerHTML = table;

  let totalPnL = total-cost;
  let totalPct = totalPnL/cost*100;

  document.getElementById("value").innerText = money(total);
  document.getElementById("pnl").innerText = money(totalPnL);
  document.getElementById("pnl").className = "metric "+(totalPnL>=0?"positive":"negative");

  document.getElementById("best").innerText = best.ticker;
  document.getElementById("largest").innerText = largest.ticker;
}

load();
buildChart();

</script>

</body>
</html>
