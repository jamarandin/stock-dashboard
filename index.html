<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Defense & AI Portfolio Tracker</title>

<style>
body {
  margin:0;
  font-family:system-ui;
  background:#06122a;
  color:#fff;
}

.wrap {
  max-width:1200px;
  margin:auto;
  padding:30px;
}

h1 { font-size:32px; margin-bottom:10px; }

.sub { color:#aab; margin-bottom:20px; }

.card {
  background:#0c1e44;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
}

.metric { font-size:28px; font-weight:bold; }

.positive { color:#34d399; }
.negative { color:#f87171; }

table {
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th, td {
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.1);
  text-align:left;
}

button {
  padding:10px 14px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  margin-right:10px;
}

.primary { background:#3b82f6; color:white; }
.secondary { background:#222; color:white; }

.status {
  font-size:14px;
  margin-top:10px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="wrap">

<h1>Defense & AI Portfolio Tracker</h1>

<div class="sub">
Tracking positions aligned to defense, AI infrastructure, and geopolitical momentum.
</div>

<button class="primary" onclick="refreshQuotes()">Refresh now</button>
<button class="secondary" onclick="toggleAuto()">Toggle auto-refresh</button>

<div class="status" id="status">Connecting...</div>

<div class="grid">

<div class="card">
<div>Portfolio Value</div>
<div class="metric" id="value">$0</div>
</div>

<div class="card">
<div>Unrealized P/L</div>
<div class="metric" id="pnl">$0</div>
</div>

<div class="card">
<div>Best Position</div>
<div class="metric" id="best">--</div>
</div>

<div class="card">
<div>Largest Allocation</div>
<div class="metric" id="largest">--</div>
</div>

</div>

<div class="card">

<h3>Your Positions</h3>

<table>
<thead>
<tr>
<th>Ticker</th>
<th>Shares</th>
<th>Avg Cost</th>
<th>Price</th>
<th>Value</th>
<th>P/L</th>
<th>P/L %</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

</div>

<script>

// ✅ YOUR EXISTING KEY (we'll rotate later)
const FINNHUB_API_KEY = "d73dm2hr01qjjol2lqq0d73dm2hr01qjjol2lqqg";

const positions = [
{ ticker:"DRS", shares:5.400676, avg:46.29 },
{ ticker:"RTX", shares:3.634664, avg:192.59 },
{ ticker:"MRCY", shares:3.292506, avg:75.93 },
{ ticker:"LDOS", shares:3.168075, avg:157.82 },
{ ticker:"PLTR", shares:5.392289, avg:148.36 },
{ ticker:"AGH", shares:62.131868, avg:4.02 },
{ ticker:"UMAC", shares:15.757957, avg:15.87 }
];

let auto = true;

function fmt(x) { return "$" + x.toFixed(2); }

async function getPrice(ticker) {
  const url = `https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${FINNHUB_API_KEY}&t=${Date.now()}`;
  const res = await fetch(url);
  const data = await res.json();

  if (!data.c) throw new Error("bad price");
  return data.c;
}

async function refreshQuotes() {

  document.getElementById("status").innerText = "Fetching live prices...";

  let success = 0;

  for (let p of positions) {
    try {
      p.price = await getPrice(p.ticker);
      success++;
    } catch (e) {
      console.log("fail", p.ticker);
      p.price = p.avg;
    }
  }

  render();

  document.getElementById("status").innerText =
    success ? `Live (${success}/${positions.length})` : "Failed";
}

function render() {

  let totalValue = 0;
  let totalCost = 0;

  positions.forEach(p => {
    p.value = p.price * p.shares;
    p.cost = p.avg * p.shares;
    p.pnl = p.value - p.cost;
    p.pct = (p.pnl / p.cost) * 100;

    totalValue += p.value;
    totalCost += p.cost;
  });

  document.getElementById("value").innerText = fmt(totalValue);

  const totalPnL = totalValue - totalCost;
  const pnlEl = document.getElementById("pnl");
  pnlEl.innerText = fmt(totalPnL);
  pnlEl.className = "metric " + (totalPnL >= 0 ? "positive" : "negative");

  const best = [...positions].sort((a,b)=>b.pct-a.pct)[0];
  document.getElementById("best").innerText = best.ticker;

  const largest = [...positions].sort((a,b)=>b.value-a.value)[0];
  document.getElementById("largest").innerText = largest.ticker;

  const table = document.getElementById("table");
  table.innerHTML = "";

  positions.forEach(p => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${p.ticker}</td>
      <td>${p.shares.toFixed(2)}</td>
      <td>${fmt(p.avg)}</td>
      <td>${fmt(p.price)}</td>
      <td>${fmt(p.value)}</td>
      <td class="${p.pnl>=0?"positive":"negative"}">${fmt(p.pnl)}</td>
      <td class="${p.pct>=0?"positive":"negative"}">${p.pct.toFixed(2)}%</td>
    `;

    table.appendChild(tr);
  });
}

function toggleAuto() {
  auto = !auto;
}

setInterval(() => {
  if (auto) refreshQuotes();
}, 120000);

refreshQuotes();

</script>

</body>
</html>
